 <html>
  <head>
    <title>Minha quarta experiência de RA usando AR.js e o A-frame, com marcador hiro de imagem, acrescentando áudio</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
 
  <body style="margin: 0px; overflow: hidden">
    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">
       <a-assets>
        <audio id="hino" src="hino.mp3"></audio>
    </a-assets>
      <a-marker type="pattern" url="pattern-csc1.patt">
       <a-image src="ceara14.jpg" position="0 0.5 0" rotation="-90 0 0" width="1.6" height="1"></a-image>
         <a-entity
        sound="src: #hino.mp3; autoplay: false; loop: true">
    </a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
    <script>
document.addEventListener("DOMContentLoaded", () => {

    const marker = document.querySelector("a-marker");
    const som = document.querySelector("[sound]");

    marker.addEventListener("markerFound", () => {
        som.components.sound.playSound();
    });

    marker.addEventListener("markerLost", () => {
        som.components.sound.stopSound();
    });

});
</script>
  </body>
 
</html>
